<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>My Calendar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
    body {
      font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
      min-height: 100vh;
      color: #fff;
      text-align: center;
      background: linear-gradient(120deg, #3fd0ff, #8a5cff, #ff5fa2, #ffd23f);
      background-size: 400% 400%;
      animation: flow 16s ease infinite;
      padding: 22px 14px 50px;
    }
    @keyframes flow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    h1 { font-size: clamp(1.8rem, 7vw, 3.2rem); text-shadow: 3px 3px 0 rgba(0,0,0,0.22); }

    /* Month bar */
    .bar {
      display: flex; align-items: center; justify-content: center; gap: 14px;
      margin: 16px auto 10px; max-width: 760px;
    }
    #monthLabel { font-size: clamp(1.2rem, 5vw, 2rem); min-width: 220px; text-shadow: 2px 2px 0 rgba(0,0,0,0.2); }
    .navbtn {
      font-family: inherit; font-weight: bold; font-size: 1.6rem;
      color: #6a2cff; background: #fff; border: 3px solid #fff; border-radius: 16px;
      width: 54px; height: 54px; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    }
    .navbtn:active { transform: translateY(2px); box-shadow: none; }
    .todaybtn {
      font-family: inherit; font-weight: bold; font-size: 1rem;
      color: #1a6e2e; background: #5fff8f; border: 3px solid #fff; border-radius: 16px;
      padding: 10px 16px; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    }
    .todaybtn:active { transform: translateY(2px); box-shadow: none; }

    /* Calendar grid */
    .cal {
      max-width: 760px; margin: 0 auto;
      background: rgba(255,255,255,0.16);
      border: 5px solid #fff; border-radius: 24px; padding: 12px;
    }
    .weekdays, .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .weekdays div { font-weight: bold; padding: 6px 0; font-size: clamp(0.7rem, 2.6vw, 1rem); }
    .day {
      position: relative;
      background: rgba(255,255,255,0.9);
      color: #4a2b8c;
      border-radius: 12px;
      min-height: 62px;
      padding: 6px 4px 16px;
      cursor: pointer;
      font-weight: bold;
      display: flex; flex-direction: column; align-items: center;
      transition: transform 0.1s ease;
      touch-action: none; /* let you DRAG across days without the page scrolling */
    }
    .day:hover { transform: scale(1.05); }
    .day.blank { background: transparent; cursor: default; }
    .day.blank:hover { transform: none; }
    /* TODAY gets a blue ring around the whole square + a blue dot on the number */
    .day.today { background: rgba(42,107,255,0.14); box-shadow: 0 0 0 4px #2a6bff inset; }
    .day .num { font-size: clamp(0.9rem, 3vw, 1.2rem); }
    .day.today .num {
      background: #2a6bff; color: #fff;
      width: 1.9em; height: 1.9em; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .day .dots { margin-top: 3px; font-size: 0.6rem; line-height: 1; color: #ff2a2a; }
    .day .mini {
      font-size: 0.55rem; color: #2a6bff; line-height: 1.1;
      max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    /* the "huge line" bar for a multi-day event (vacations, trips…) */
    .day .rangebar {
      position: absolute; left: -4px; right: -4px; bottom: 3px;
      height: 15px; background: #ff5fa2; color: #fff;
      font-size: 0.55rem; line-height: 15px; white-space: nowrap;
      overflow: hidden; text-align: center;
    }
    .day .rangebar.start { left: 3px; border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
    .day .rangebar.end   { right: 3px; border-top-right-radius: 8px; border-bottom-right-radius: 8px; }
    /* while you're dragging to pick a range */
    .day.selecting { background: #ffe08a; box-shadow: 0 0 0 3px #ff8f3f inset; }

    /* Add-event popup */
    #modal, #rangeModal {
      position: fixed; inset: 0; z-index: 20; display: none;
      align-items: center; justify-content: center;
      background: rgba(30, 8, 60, 0.75); padding: 20px;
    }
    #modal.show, #rangeModal.show { display: flex; }
    .card {
      background: #fff; color: #4a2b8c; border-radius: 22px; padding: 20px;
      width: 100%; max-width: 380px; text-align: center;
    }
    .card h2 { font-size: 1.4rem; margin-bottom: 10px; }
    /* Let you actually TYPE in the boxes (the page blocks selecting everywhere else) */
    input, #eventInput, #rangeInput { -webkit-user-select: text; user-select: text; }
    #eventInput, #rangeInput {
      font-family: inherit; font-size: 1.1rem; width: 100%;
      padding: 12px; border: 3px solid #8a5cff; border-radius: 14px; margin-bottom: 10px;
    }
    .card .row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .cbtn {
      font-family: inherit; font-weight: bold; font-size: 1rem;
      border: none; border-radius: 14px; padding: 10px 18px; cursor: pointer;
    }
    .cbtn.add { background: #5fff8f; color: #1a6e2e; }
    .cbtn.close { background: #eee; color: #a04; }
    #eventList { list-style: none; text-align: left; margin: 6px 0 12px; }
    #eventList li {
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
      background: #f2ecff; border-radius: 10px; padding: 8px 10px; margin: 5px 0; font-size: 1rem;
    }
    #eventList .del { background: #ffdada; color: #a04; border: none; border-radius: 8px; padding: 4px 8px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <h1>📅 My Calendar</h1>

  <div class="bar">
    <button class="navbtn" id="prev">◀</button>
    <div id="monthLabel">Month</div>
    <button class="navbtn" id="next">▶</button>
  </div>
  <button class="todaybtn" id="todayBtn">⭐ Go to Today</button>

  <div class="cal">
    <div class="weekdays">
      <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>
    <div class="days" id="days"></div>
  </div>

  <!-- Add-event popup -->
  <div id="modal">
    <div class="card">
      <h2 id="modalTitle">Add an event</h2>
      <input id="eventInput" type="text" placeholder="Type something fun… 🎉" maxlength="40">
      <div class="row">
        <button class="cbtn add" id="addBtn">➕ Add</button>
        <button class="cbtn close" id="closeBtn">Close</button>
      </div>
      <ul id="eventList"></ul>
    </div>
  </div>

  <!-- Name-your-multi-day-event popup -->
  <div id="rangeModal">
    <div class="card">
      <h2 id="rangeTitle">New trip!</h2>
      <p style="margin-bottom:8px; font-size:0.95rem;">🏖️ What are these days for? (like "Vacation!")</p>
      <input id="rangeInput" type="text" placeholder="Name your days… 🎉" maxlength="40">
      <div class="row">
        <button class="cbtn add" id="rangeAddBtn">➕ Add these days</button>
        <button class="cbtn close" id="rangeCloseBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    var MONTHS = ["January","February","March","April","May","June",
                  "July","August","September","October","November","December"];

    var today = new Date();
    var viewYear = today.getFullYear();
    var viewMonth = today.getMonth(); // 0-11
    var openKey = null; // which day the popup is showing

    // ---- Saved events live in the browser (localStorage) ----
    function loadEvents() {
      try { return JSON.parse(localStorage.getItem("calendar_events") || "{}"); }
      catch (e) { return {}; }
    }
    function saveEvents(obj) {
      try { localStorage.setItem("calendar_events", JSON.stringify(obj)); } catch (e) {}
    }
    var events = loadEvents();
    function keyFor(y, m, d) { return y + "-" + (m + 1) + "-" + d; }

    // ---- Multi-day events (drag across days, like a vacation!) ----
    function loadRanges() { try { return JSON.parse(localStorage.getItem("calendar_ranges") || "[]"); } catch (e) { return []; } }
    function saveRanges() { try { localStorage.setItem("calendar_ranges", JSON.stringify(ranges)); } catch (e) {} }
    var ranges = loadRanges();
    var RANGE_COLORS = ["#ff5fa2", "#3fd0ff", "#5fff8f", "#ffd23f", "#ff8f3f", "#c98aff"];
    function keyToDate(k) { var p = k.split("-"); return new Date(+p[0], +p[1] - 1, +p[2]); }
    function sameDay(a, b) { return a.getTime() === b.getTime(); }

    var dayCells = {}; // dayNumber -> cell element (used while dragging)
    function render() {
      document.getElementById("monthLabel").textContent = MONTHS[viewMonth] + " " + viewYear;
      var daysEl = document.getElementById("days");
      daysEl.innerHTML = "";
      dayCells = {};

      var firstDay = new Date(viewYear, viewMonth, 1).getDay(); // 0=Sun
      var numDays = new Date(viewYear, viewMonth + 1, 0).getDate();

      // blank cells before the 1st
      for (var b = 0; b < firstDay; b++) {
        var blank = document.createElement("div");
        blank.className = "day blank";
        daysEl.appendChild(blank);
      }

      for (var d = 1; d <= numDays; d++) {
        var cell = document.createElement("div");
        cell.className = "day";
        cell.dataset.day = d;
        var isToday = (viewYear === today.getFullYear() && viewMonth === today.getMonth() && d === today.getDate());
        if (isToday) cell.className += " today";

        var num = document.createElement("div"); num.className = "num"; num.textContent = d;
        cell.appendChild(num);

        var k = keyFor(viewYear, viewMonth, d);
        var list = events[k] || [];
        if (list.length) {
          var mini = document.createElement("div"); mini.className = "mini"; mini.textContent = list[0];
          cell.appendChild(mini);
          if (list.length > 1) {
            var dots = document.createElement("div"); dots.className = "dots";
            dots.textContent = "+" + (list.length - 1) + " more";
            cell.appendChild(dots);
          }
        }

        // draw a bar for every multi-day event covering this day
        var cellDate = new Date(viewYear, viewMonth, d);
        var weekday = cellDate.getDay();
        var barIndex = 0;
        ranges.forEach(function (rg) {
          var s = keyToDate(rg.start), e = keyToDate(rg.end);
          if (cellDate >= s && cellDate <= e) {
            var bar = document.createElement("div");
            bar.className = "rangebar";
            if (sameDay(cellDate, s) || weekday === 0) bar.className += " start"; // rounded at the start / week start
            if (sameDay(cellDate, e) || weekday === 6) bar.className += " end";   // rounded at the end / week end
            bar.style.background = rg.color || "#ff5fa2";
            bar.style.bottom = (3 + barIndex * 17) + "px";
            if (sameDay(cellDate, s)) bar.textContent = rg.name; // name shows on the first day
            cell.appendChild(bar);
            barIndex++;
          }
        });

        dayCells[d] = cell;
        (function (dayNum) {
          cell.addEventListener("pointerdown", function (e) { startDrag(dayNum, e); });
        })(d);
        daysEl.appendChild(cell);
      }
    }

    // ---- The add-event popup ----
    function openDay(d) {
      openKey = keyFor(viewYear, viewMonth, d);
      document.getElementById("modalTitle").textContent = MONTHS[viewMonth] + " " + d + ", " + viewYear;
      document.getElementById("eventInput").value = "";
      renderEventList();
      document.getElementById("modal").classList.add("show");
      document.getElementById("eventInput").focus();
    }
    function renderEventList() {
      var ul = document.getElementById("eventList");
      ul.innerHTML = "";
      var count = 0;
      var list = events[openKey] || [];
      list.forEach(function (text, i) {
        var li = document.createElement("li");
        var span = document.createElement("span"); span.textContent = "🎈 " + text;
        var del = document.createElement("button"); del.className = "del"; del.textContent = "✕";
        del.addEventListener("click", function () {
          events[openKey].splice(i, 1);
          if (!events[openKey].length) delete events[openKey];
          saveEvents(events); renderEventList(); render();
        });
        li.appendChild(span); li.appendChild(del);
        ul.appendChild(li);
        count++;
      });
      // also show any multi-day events that cover this day
      var here = keyToDate(openKey);
      ranges.forEach(function (rg, ri) {
        var s = keyToDate(rg.start), e = keyToDate(rg.end);
        if (here >= s && here <= e) {
          var li = document.createElement("li");
          var span = document.createElement("span"); span.textContent = "🏖️ " + rg.name + " (multi-day)";
          var del = document.createElement("button"); del.className = "del"; del.textContent = "✕";
          del.addEventListener("click", function () {
            ranges.splice(ri, 1); saveRanges(); renderEventList(); render();
          });
          li.appendChild(span); li.appendChild(del);
          ul.appendChild(li);
          count++;
        }
      });
      if (!count) {
        var empty = document.createElement("li");
        empty.textContent = "Nothing here yet — add something!";
        ul.appendChild(empty);
      }
    }
    function addEvent() {
      var input = document.getElementById("eventInput");
      var text = input.value.trim();
      if (!text) return;
      if (!events[openKey]) events[openKey] = [];
      events[openKey].push(text);
      saveEvents(events);
      input.value = "";
      renderEventList(); render();
      input.focus();
    }

    document.getElementById("addBtn").addEventListener("click", addEvent);
    document.getElementById("eventInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter") addEvent();
    });
    document.getElementById("closeBtn").addEventListener("click", function () {
      document.getElementById("modal").classList.remove("show");
    });
    document.getElementById("modal").addEventListener("click", function (e) {
      if (e.target === this) this.classList.remove("show"); // tap outside to close
    });

    document.getElementById("prev").addEventListener("click", function () {
      viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } render();
    });
    document.getElementById("next").addEventListener("click", function () {
      viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } render();
    });
    document.getElementById("todayBtn").addEventListener("click", function () {
      viewYear = today.getFullYear(); viewMonth = today.getMonth(); render();
    });

    // ---- Drag across days to make a multi-day event ----
    var dragging = false, dragStart = null, dragEnd = null, dragMoved = false;
    function startDrag(dayNum, e) {
      dragging = true; dragStart = dayNum; dragEnd = dayNum; dragMoved = false;
      updateSelPreview();
      e.preventDefault();
    }
    function dayUnderPoint(x, y) {
      var el = document.elementFromPoint(x, y);
      var cell = el && el.closest ? el.closest(".day") : null;
      if (!cell || cell.classList.contains("blank") || !cell.dataset.day) return null;
      return +cell.dataset.day;
    }
    window.addEventListener("pointermove", function (e) {
      if (!dragging) return;
      var d = dayUnderPoint(e.clientX, e.clientY);
      if (d && d !== dragEnd) {
        dragEnd = d;
        if (d !== dragStart) dragMoved = true;
        updateSelPreview();
      }
    });
    window.addEventListener("pointerup", function () {
      if (!dragging) return;
      dragging = false;
      clearSelPreview();
      if (dragMoved && dragStart !== dragEnd) {
        openRange(Math.min(dragStart, dragEnd), Math.max(dragStart, dragEnd)); // a dragged range
      } else {
        openDay(dragStart); // just a tap = a one-day event
      }
    });
    function updateSelPreview() {
      var lo = Math.min(dragStart, dragEnd), hi = Math.max(dragStart, dragEnd);
      for (var d in dayCells) { var n = +d; dayCells[d].classList.toggle("selecting", n >= lo && n <= hi); }
    }
    function clearSelPreview() { for (var d in dayCells) dayCells[d].classList.remove("selecting"); }

    // ---- Name-your-multi-day-event popup ----
    var pendingRange = null;
    function openRange(lo, hi) {
      pendingRange = { start: keyFor(viewYear, viewMonth, lo), end: keyFor(viewYear, viewMonth, hi) };
      document.getElementById("rangeTitle").textContent =
        MONTHS[viewMonth] + " " + lo + " – " + hi + "  (" + (hi - lo + 1) + " days)";
      document.getElementById("rangeInput").value = "";
      document.getElementById("rangeModal").classList.add("show");
      document.getElementById("rangeInput").focus();
    }
    function addRange() {
      var input = document.getElementById("rangeInput");
      var text = input.value.trim();
      if (!text || !pendingRange) return;
      ranges.push({ start: pendingRange.start, end: pendingRange.end, name: text,
                    color: RANGE_COLORS[ranges.length % RANGE_COLORS.length] });
      saveRanges();
      document.getElementById("rangeModal").classList.remove("show");
      pendingRange = null;
      render();
    }
    document.getElementById("rangeAddBtn").addEventListener("click", addRange);
    document.getElementById("rangeInput").addEventListener("keydown", function (e) { if (e.key === "Enter") addRange(); });
    document.getElementById("rangeCloseBtn").addEventListener("click", function () {
      document.getElementById("rangeModal").classList.remove("show"); pendingRange = null;
    });
    document.getElementById("rangeModal").addEventListener("click", function (e) {
      if (e.target === this) { this.classList.remove("show"); pendingRange = null; }
    });

    render();
  </script>
</body>
</html>
