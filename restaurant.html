<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Cozy Restaurant!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
    body {
      font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
      min-height: 100vh;
      color: #fff;
      text-align: center;
      background: linear-gradient(120deg, #8a5cff, #3fd0ff, #5fff8f);
      background-size: 300% 300%;
      animation: flow 12s ease infinite;
      padding: 22px 14px 50px;
    }
    @keyframes flow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    h1 { font-size: clamp(1.8rem, 7vw, 3.2rem); text-shadow: 3px 3px 0 rgba(0,0,0,0.2); }
    .sub { font-size: clamp(1rem, 3.4vw, 1.25rem); margin: 8px 0 16px; }

    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 12px;
      max-width: 620px;
      margin: 0 auto 18px;
    }
    .dish {
      background: rgba(255,255,255,0.22);
      border: 4px solid #fff;
      border-radius: 20px;
      padding: 14px 8px;
      cursor: pointer;
      transition: transform 0.1s ease;
      backdrop-filter: blur(3px);
    }
    .dish:active { transform: scale(0.92); }
    .dish .emo { font-size: 2.8rem; }
    .dish .nm { font-size: 0.95rem; margin-top: 4px; }

    /* the table where food gets served */
    #stage {
      max-width: 620px;
      margin: 0 auto;
      min-height: 220px;
      background: rgba(255,255,255,0.18);
      border: 5px dashed #fff;
      border-radius: 24px;
      padding: 18px;
      overflow: hidden;
      position: relative;
    }
    #status { font-size: clamp(1.2rem, 5vw, 1.9rem); min-height: 1.5em; text-shadow: 2px 2px 0 rgba(0,0,0,0.18); }
    #plate { font-size: clamp(4rem, 22vw, 8rem); line-height: 1.1; min-height: 1.2em; }

    .waiter {
      position: absolute;
      bottom: 14px;
      left: -90px;
      font-size: 3.2rem;
    }
    .waiter.serve { animation: walkin 1.1s ease forwards; }
    @keyframes walkin {
      to { left: calc(50% - 24px); }
    }
    .cooking { display: inline-block; animation: shake 0.4s ease-in-out infinite; }
    @keyframes shake { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }

    .btn {
      font-family: inherit;
      font-weight: bold;
      font-size: 1.1rem;
      color: #b23;
      background: #fff;
      border: 3px solid #fff;
      border-radius: 18px;
      padding: 10px 20px;
      margin: 16px 8px 0;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    }
    .btn:active { transform: translateY(2px); box-shadow: none; }
  </style>
</head>
<body>
  <h1>🍽️ The Cozy Restaurant 👨‍🍳</h1>
  <p class="sub">Tap a meal to order it — the chef cooks it and the waiter brings it to you!</p>

  <div class="menu" id="menu"></div>

  <div id="stage">
    <div id="status">Welcome! What would you like to order? 😋</div>
    <div id="plate"></div>
    <div class="waiter" id="waiter">🧑‍🍳</div>
  </div>

  <button class="btn" id="resetBtn">Clear Table 🧽</button>

  <script>
    var MENU = [
      { emo: "🍚", nm: "Rice Bowl" },
      { emo: "🍝", nm: "Spaghetti" },
      { emo: "🍔", nm: "Burger" },
      { emo: "🍕", nm: "Pizza" },
      { emo: "🌮", nm: "Tacos" },
      { emo: "🍜", nm: "Noodles" },
      { emo: "🥞", nm: "Pancakes" },
      { emo: "🍣", nm: "Sushi" }
    ];

    var menuWrap = document.getElementById("menu");
    var status = document.getElementById("status");
    var plate = document.getElementById("plate");
    var waiter = document.getElementById("waiter");
    var busy = false;

    MENU.forEach(function (d) {
      var b = document.createElement("div");
      b.className = "dish";
      b.innerHTML = '<div class="emo">' + d.emo + '</div><div class="nm">' + d.nm + '</div>';
      b.addEventListener("click", function () { order(d); });
      menuWrap.appendChild(b);
    });

    function order(d) {
      if (busy) return;
      busy = true;
      plate.textContent = "";
      waiter.classList.remove("serve");
      waiter.style.left = "-90px";
      status.innerHTML = '👨‍🍳 The chef is cooking your <b>' + d.nm + '</b>... <span class="cooking">' + d.emo + '</span>';
      // cook for a couple seconds
      setTimeout(function () {
        status.textContent = "🛎️ Order up! The waiter is bringing it...";
        waiter.classList.add("serve");
        setTimeout(function () {
          plate.textContent = d.emo;
          status.innerHTML = '🍽️ Your <b>' + d.nm + '</b> is here! Enjoy! 😋';
          busy = false;
        }, 1100);
      }, 1800);
    }

    document.getElementById("resetBtn").addEventListener("click", function () {
      if (busy) return;
      plate.textContent = "";
      waiter.classList.remove("serve");
      waiter.style.left = "-90px";
      status.textContent = "Welcome! What would you like to order? 😋";
    });
  </script>
</body>
</html>
