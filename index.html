<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Keep this page off Google so it stays our secret -->
  <meta name="robots" content="noindex, nofollow">
  <title>Birthday Countdown!</title>
  <style>
    :root {
      --p1: #ff5fa2;
      --p2: #ffd23f;
      --p3: #3fd0ff;
      --p4: #8a5cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
      min-height: 100vh;
      color: #fff;
      text-align: center;
      background: linear-gradient(120deg, var(--p1), var(--p2), var(--p3), var(--p4));
      background-size: 400% 400%;
      animation: flow 12s ease infinite;
      padding: 30px 18px 60px;
    }
    @keyframes flow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    h1 {
      font-size: clamp(2.2rem, 8vw, 4.5rem);
      text-shadow: 4px 4px 0 rgba(0,0,0,0.18);
      animation: pop 2.5s ease-in-out infinite;
    }
    @keyframes pop {
      0%, 100% { transform: scale(1) rotate(-1deg); }
      50%      { transform: scale(1.05) rotate(1deg); }
    }
    .hint {
      font-size: clamp(1rem, 3.5vw, 1.3rem);
      margin-top: 8px;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
    }

    /* The big countdown box */
    .countdown {
      margin: 24px auto 36px;
      max-width: 560px;
      background: rgba(255,255,255,0.25);
      border: 5px dashed #fff;
      border-radius: 30px;
      padding: 26px 20px;
      backdrop-filter: blur(4px);
    }
    .countdown .number {
      font-size: clamp(4rem, 22vw, 9rem);
      line-height: 1;
      text-shadow: 5px 5px 0 rgba(0,0,0,0.18);
      animation: bounce 1.6s ease-in-out infinite;
    }
    .countdown .label {
      font-size: clamp(1.2rem, 5vw, 2rem);
      margin-top: 6px;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }

    /* The five press-me boxes */
    .boxes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      max-width: 820px;
      margin: 0 auto;
    }
    .box {
      background: rgba(255,255,255,0.22);
      border: 4px solid #fff;
      border-radius: 24px;
      padding: 20px 18px;
      backdrop-filter: blur(4px);
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    .box:hover  { transform: translateY(-6px) scale(1.03); }
    .box:active { transform: scale(0.97); }
    .box .icon { font-size: 3rem; }
    .box .title {
      font-size: 1.3rem;
      margin: 6px 0 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .box .value {
      font-size: 1.4rem;
      font-weight: bold;
      min-height: 1.4em;
      color: #fff;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.18);
    }
    .box .value.empty {
      opacity: 0.85;
      font-style: italic;
      font-weight: normal;
    }
  </style>
</head>
<body>
  <h1>🎂 Birthday Countdown! 🎉</h1>
  <p class="hint">Press a box and type in your answer! 👇</p>

  <div class="countdown">
    <div class="number" id="days">--</div>
    <div class="label" id="daysLabel">Press the When box to start the countdown!</div>
  </div>

  <div class="boxes">
    <div class="box" id="box-who">
      <div class="icon">🎈</div>
      <div class="title">Whose Birthday</div>
      <div class="value empty" id="who">Press to type!</div>
    </div>
    <div class="box" id="box-when">
      <div class="icon">📅</div>
      <div class="title">When</div>
      <div class="value empty" id="when">Press to pick a day!</div>
    </div>
    <div class="box" id="box-theme">
      <div class="icon">🎉</div>
      <div class="title">Theme</div>
      <div class="value empty" id="theme">Press to type!</div>
    </div>
    <div class="box" id="box-food">
      <div class="icon">🍕</div>
      <div class="title">Food</div>
      <div class="value empty" id="food">Press to type!</div>
    </div>
    <div class="box" id="box-where">
      <div class="icon">📍</div>
      <div class="title">Where</div>
      <div class="value empty" id="where">Press to type!</div>
    </div>
  </div>

  <!-- Hidden date picker that the When box uses -->
  <input type="date" id="datePicker" style="position:absolute; opacity:0; pointer-events:none;">

  <script>
    // The text boxes: id -> the question to ask when you press it
    var questions = {
      who:   "Whose birthday is it? Type a name:",
      theme: "What is the theme for the birthday?",
      food:  "What food will there be?",
      where: "Where is the party going to be?"
    };

    // Show a saved value (or the friendly placeholder) in a box
    function showValue(id, text) {
      var el = document.getElementById(id);
      if (text && text.length > 0) {
        el.textContent = text;
        el.classList.remove("empty");
      } else {
        el.textContent = (id === "when") ? "Press to pick a day!" : "Press to type!";
        el.classList.add("empty");
      }
    }

    // Load any saved answers when the page opens
    Object.keys(questions).forEach(function (id) {
      showValue(id, localStorage.getItem("bday_" + id));
      // Pressing a text box asks the question
      document.getElementById("box-" + id).addEventListener("click", function () {
        var current = localStorage.getItem("bday_" + id) || "";
        var answer = prompt(questions[id], current);
        if (answer !== null) { // null means they pressed Cancel
          localStorage.setItem("bday_" + id, answer);
          showValue(id, answer);
        }
      });
    });

    // The When box opens a calendar to pick the day
    var datePicker = document.getElementById("datePicker");
    showValue("when", localStorage.getItem("bday_when_pretty"));
    document.getElementById("box-when").addEventListener("click", function () {
      datePicker.value = localStorage.getItem("bday_when_raw") || "";
      if (datePicker.showPicker) {
        datePicker.showPicker();
      } else {
        datePicker.focus();
        datePicker.click();
      }
    });
    datePicker.addEventListener("change", function () {
      var raw = datePicker.value; // like "2026-12-25"
      localStorage.setItem("bday_when_raw", raw);
      var pretty = "";
      if (raw) {
        var parts = raw.split("-");
        var d = new Date(parts[0], parts[1] - 1, parts[2]);
        pretty = d.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });
      }
      localStorage.setItem("bday_when_pretty", pretty);
      showValue("when", pretty);
      updateCountdown();
    });

    function updateCountdown() {
      var raw = localStorage.getItem("bday_when_raw");
      var numberEl = document.getElementById("days");
      var labelEl = document.getElementById("daysLabel");

      if (!raw) {
        numberEl.textContent = "--";
        labelEl.textContent = "Press the When box to start the countdown!";
        return;
      }

      var parts = raw.split("-");
      var birthday = new Date(parts[0], parts[1] - 1, parts[2], 0, 0, 0);
      var now = new Date();
      var msPerDay = 1000 * 60 * 60 * 24;
      var days = Math.ceil((birthday - now) / msPerDay);

      if (days > 1) {
        numberEl.textContent = days;
        labelEl.textContent = "days until the big day!";
      } else if (days === 1) {
        numberEl.textContent = "1";
        labelEl.textContent = "day to go! Almost here!";
      } else if (days === 0) {
        numberEl.textContent = "🎉";
        labelEl.textContent = "IT'S TODAY! HAPPY BIRTHDAY!";
      } else {
        numberEl.textContent = "🎂";
        labelEl.textContent = "Hope it was a great party!";
      }
    }

    updateCountdown();
    setInterval(updateCountdown, 1000 * 60 * 60); // refresh every hour
  </script>
</body>
</html>
