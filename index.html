<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Keep this page off Google so it stays our secret -->
  <meta name="robots" content="noindex, nofollow">
  <title>Ben's Clubhouse</title>
  <style>
    :root {
      --p1: #ff5fa2;
      --p2: #ffd23f;
      --p3: #3fd0ff;
      --p4: #8a5cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
      background: linear-gradient(120deg, var(--p1), var(--p2), var(--p3), var(--p4));
      background-size: 400% 400%;
      animation: flow 12s ease infinite;
      overflow: hidden;
      padding: 24px;
    }
    @keyframes flow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    h1 {
      font-size: clamp(2.5rem, 9vw, 5.5rem);
      text-shadow: 4px 4px 0 rgba(0,0,0,0.18);
      animation: pop 2.5s ease-in-out infinite;
    }
    @keyframes pop {
      0%, 100% { transform: scale(1) rotate(-1deg); }
      50%      { transform: scale(1.06) rotate(1deg); }
    }
    p.sub {
      font-size: clamp(1.1rem, 4vw, 1.8rem);
      margin-top: 18px;
      max-width: 720px;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
    }
    .badge {
      margin-top: 28px;
      background: rgba(255,255,255,0.22);
      border: 3px dashed #fff;
      border-radius: 22px;
      padding: 18px 26px;
      font-size: clamp(1rem, 3.5vw, 1.4rem);
      backdrop-filter: blur(4px);
      max-width: 620px;
    }
    .emojis {
      font-size: clamp(2rem, 8vw, 4rem);
      margin-bottom: 10px;
      animation: bounce 1.8s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-14px); }
    }
    .float {
      position: absolute;
      font-size: 2.5rem;
      opacity: 0.85;
      animation: rise 9s linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.9; }
      90%  { opacity: 0.9; }
      100% { transform: translateY(-15vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="float" style="left:8%;  animation-delay:0s;">⭐</div>
  <div class="float" style="left:24%; animation-delay:2s;">🚀</div>
  <div class="float" style="left:42%; animation-delay:4s;">🎮</div>
  <div class="float" style="left:60%; animation-delay:1s;">🦖</div>
  <div class="float" style="left:78%; animation-delay:3s;">🌈</div>
  <div class="float" style="left:90%; animation-delay:5s;">🎉</div>

  <div class="emojis">🎨 🛠️ ✨</div>
  <h1>Ben's Clubhouse</h1>
  <p class="sub">Welcome to YOUR website, Ben! This is your own corner of the internet. Right now it's a blank canvas — but it can become ANYTHING you want.</p>
  <div class="badge">
    🤖 Tell Claude your first idea and watch it come to life!<br>
    Dinosaurs? Space? A game? Your art? You're the boss. 👑
  </div>
</body>
</html>
