<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Keep this page off Google so it stays our secret -->
  <meta name="robots" content="noindex, nofollow">
  <title>Birthday Countdown!</title>
  <style>
    :root {
      --p1: #ff5fa2;
      --p2: #ffd23f;
      --p3: #3fd0ff;
      --p4: #8a5cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
      min-height: 100vh;
      color: #fff;
      text-align: center;
      background: linear-gradient(120deg, var(--p1), var(--p2), var(--p3), var(--p4));
      background-size: 400% 400%;
      animation: flow 12s ease infinite;
      padding: 30px 18px 60px;
    }
    @keyframes flow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    h1 {
      font-size: clamp(2.2rem, 8vw, 4.5rem);
      text-shadow: 4px 4px 0 rgba(0,0,0,0.18);
      animation: pop 2.5s ease-in-out infinite;
    }
    @keyframes pop {
      0%, 100% { transform: scale(1) rotate(-1deg); }
      50%      { transform: scale(1.05) rotate(1deg); }
    }
    .hint {
      font-size: clamp(1rem, 3.5vw, 1.3rem);
      margin-top: 8px;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
    }

    /* The big countdown box */
    .countdown {
      margin: 24px auto 36px;
      max-width: 560px;
      background: rgba(255,255,255,0.25);
      border: 5px dashed #fff;
      border-radius: 30px;
      padding: 26px 20px;
      backdrop-filter: blur(4px);
    }
    .countdown .number {
      font-size: clamp(4rem, 22vw, 9rem);
      line-height: 1;
      text-shadow: 5px 5px 0 rgba(0,0,0,0.18);
      animation: bounce 1.6s ease-in-out infinite;
    }
    .countdown .label {
      font-size: clamp(1.2rem, 5vw, 2rem);
      margin-top: 6px;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }

    /* The five type-in boxes */
    .boxes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      max-width: 820px;
      margin: 0 auto;
    }
    .box {
      background: rgba(255,255,255,0.22);
      border: 4px solid #fff;
      border-radius: 24px;
      padding: 20px 18px;
      backdrop-filter: blur(4px);
    }
    .box .icon { font-size: 3rem; }
    .box .title {
      font-size: 1.3rem;
      margin: 6px 0 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .box input {
      width: 100%;
      font-family: inherit;
      font-size: 1.2rem;
      font-weight: bold;
      text-align: center;
      color: #6a2cff;
      background: #fff;
      border: none;
      border-radius: 14px;
      padding: 12px 10px;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.12);
    }
    .box input:focus {
      outline: 4px solid #ffd23f;
    }
  </style>
</head>
<body>
  <h1>🎂 Birthday Countdown! 🎉</h1>
  <p class="hint">Type in the boxes below to fill in your party! ✏️</p>

  <div class="countdown">
    <div class="number" id="days">--</div>
    <div class="label" id="daysLabel">Pick a date below to start the countdown!</div>
  </div>

  <div class="boxes">
    <div class="box">
      <div class="icon">🎈</div>
      <div class="title">Whose Birthday</div>
      <input id="who" type="text" placeholder="Type a name...">
    </div>
    <div class="box">
      <div class="icon">📅</div>
      <div class="title">When</div>
      <input id="when" type="date">
    </div>
    <div class="box">
      <div class="icon">🎉</div>
      <div class="title">Theme</div>
      <input id="theme" type="text" placeholder="Type a theme...">
    </div>
    <div class="box">
      <div class="icon">🍕</div>
      <div class="title">Food</div>
      <input id="food" type="text" placeholder="Type the food...">
    </div>
    <div class="box">
      <div class="icon">📍</div>
      <div class="title">Where</div>
      <input id="where" type="text" placeholder="Type the place...">
    </div>
  </div>

  <script>
    // The text boxes we want to remember
    var textBoxes = ["who", "theme", "food", "where", "when"];

    // When the page opens, load anything that was typed before
    textBoxes.forEach(function (id) {
      var saved = localStorage.getItem("bday_" + id);
      if (saved !== null) {
        document.getElementById(id).value = saved;
      }
      // Save again every time someone types
      document.getElementById(id).addEventListener("input", function () {
        localStorage.setItem("bday_" + id, this.value);
        if (id === "when") updateCountdown();
      });
    });

    function updateCountdown() {
      var whenValue = document.getElementById("when").value;
      var numberEl = document.getElementById("days");
      var labelEl = document.getElementById("daysLabel");

      if (!whenValue) {
        numberEl.textContent = "--";
        labelEl.textContent = "Pick a date below to start the countdown!";
        return;
      }

      // Build the party date at midnight (local time)
      var parts = whenValue.split("-");
      var birthday = new Date(parts[0], parts[1] - 1, parts[2], 0, 0, 0);

      var now = new Date();
      var msPerDay = 1000 * 60 * 60 * 24;
      var days = Math.ceil((birthday - now) / msPerDay);

      if (days > 1) {
        numberEl.textContent = days;
        labelEl.textContent = "days until the big day!";
      } else if (days === 1) {
        numberEl.textContent = "1";
        labelEl.textContent = "day to go! Almost here!";
      } else if (days === 0) {
        numberEl.textContent = "🎉";
        labelEl.textContent = "IT'S TODAY! HAPPY BIRTHDAY!";
      } else {
        numberEl.textContent = "🎂";
        labelEl.textContent = "Hope it was a great party!";
      }
    }

    updateCountdown();
    setInterval(updateCountdown, 1000 * 60 * 60); // refresh every hour
  </script>
</body>
</html>
