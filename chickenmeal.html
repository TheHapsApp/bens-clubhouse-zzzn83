<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Build Your Chicken Meal!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
    body {
      font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
      min-height: 100vh;
      color: #fff;
      text-align: center;
      background: linear-gradient(120deg, #ff5fa2, #ff8f3f, #ffd23f);
      background-size: 300% 300%;
      animation: flow 12s ease infinite;
      padding: 20px 12px 50px;
    }
    @keyframes flow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    h1 { font-size: clamp(1.7rem, 6.5vw, 3rem); text-shadow: 3px 3px 0 rgba(0,0,0,0.2); }
    h2 { font-size: clamp(1.1rem, 4vw, 1.5rem); margin: 16px 0 6px; text-shadow: 2px 2px 0 rgba(0,0,0,0.15); }

    .row { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 660px; margin: 0 auto; }
    .chip {
      font-family: inherit; font-weight: bold; font-size: 1.05rem;
      color: #b23; background: #fff; border: 3px solid #fff; border-radius: 18px;
      padding: 10px 16px; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    }
    .chip:active { transform: translateY(2px); box-shadow: none; }
    .chip.on { background: #ffd23f; color: #a04; border-color: #a04; transform: scale(1.05); }

    #tray {
      margin: 16px auto; max-width: 480px;
      background: rgba(255,255,255,0.2); border: 5px dashed #fff; border-radius: 24px; padding: 16px;
    }
    #trayFood { font-size: clamp(2.4rem, 13vw, 4rem); line-height: 1.25; min-height: 1.3em; }
    #orderText { font-size: 1rem; margin-top: 8px; }

    .btn {
      font-family: inherit; font-weight: bold; font-size: clamp(1.2rem, 5vw, 1.8rem);
      color: #1a6e2e; background: #5fff8f; border: 4px solid #fff; border-radius: 24px;
      padding: 14px 30px; margin: 14px 8px 0; cursor: pointer; box-shadow: 0 6px 0 rgba(0,0,0,0.22);
    }
    .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.22); }
    .btn.small { font-size: 1rem; color: #b23; background: #fff; padding: 10px 18px; }

    #message { font-size: clamp(1.3rem, 5.5vw, 2.1rem); min-height: 1.5em; margin-top: 12px; text-shadow: 2px 2px 0 rgba(0,0,0,0.18); }
    .confetti { position: fixed; font-size: 1.8rem; top: -40px; z-index: 9; pointer-events: none; animation: fall 2.4s linear forwards; }
    @keyframes fall { to { transform: translateY(110vh) rotate(540deg); opacity: 0.9; } }
  </style>
</head>
<body>
  <h1>🐔 Build Your Chicken Meal! 🍟</h1>

  <h2>1. Pick your chicken</h2>
  <div class="row" id="mainRow"></div>

  <h2>2. Pick your sauces 🥫 (tap as many as you want!)</h2>
  <div class="row" id="sauceRow"></div>

  <h2>3. Pick a side 🍟</h2>
  <div class="row" id="sideRow"></div>

  <h2>4. Pick a drink 🥤</h2>
  <div class="row" id="drinkRow"></div>

  <h2>5. Add a treat 🍓 (optional)</h2>
  <div class="row" id="treatRow"></div>

  <div id="tray">
    <div id="trayFood"></div>
    <div id="orderText"></div>
  </div>

  <button class="btn" id="serveBtn">🍽️ Serve my meal!</button>
  <button class="btn small" id="resetBtn">Start Over</button>
  <div id="message"></div>

  <script>
    var MAINS = [ { e: "🍗", n: "Nuggets" }, { e: "🥪", n: "Chicken Sandwich" }, { e: "🌯", n: "Chicken Wrap" } ];
    var SAUCES = [
      { e: "🥫", n: "Chick-fil-A Sauce" }, { e: "🍍", n: "Polynesian" },
      { e: "🍖", n: "BBQ" }, { e: "🍯", n: "Honey Mustard" }, { e: "🌶️", n: "Buffalo" }, { e: "🐝", n: "Honey" }
    ];
    var SIDES = [ { e: "🍟", n: "Waffle Fries" }, { e: "🍟", n: "Regular Fries" }, { e: "🥗", n: "Side Salad" } ];
    var DRINKS = [ { e: "🥤", n: "Lemonade" }, { e: "🧋", n: "Milkshake" }, { e: "🧃", n: "Juice" }, { e: "💧", n: "Water" } ];
    var TREATS = [ { e: "🍓", n: "Strawberries" }, { e: "🍦", n: "Ice Cream" }, { e: "🍪", n: "Cookie" }, { e: "❌", n: "No Treat" } ];

    var state = { main: "🍗", sauces: [], side: "🍟", sideName: "Waffle Fries", drink: "🥤", treat: "" };

    function makeChips(rowId, list, isSel, onClick) {
      var row = document.getElementById(rowId);
      row.innerHTML = "";
      list.forEach(function (item) {
        var b = document.createElement("button");
        b.className = "chip" + (isSel(item) ? " on" : "");
        b.textContent = item.e + " " + item.n;
        b.addEventListener("click", function () { onClick(item); rebuild(); });
        row.appendChild(b);
      });
    }

    function rebuild() {
      makeChips("mainRow", MAINS, function (m) { return state.main === m.e; }, function (m) { state.main = m.e; });
      makeChips("sauceRow", SAUCES, function (s) { return state.sauces.indexOf(s.n) > -1; }, function (s) {
        var i = state.sauces.indexOf(s.n); if (i > -1) state.sauces.splice(i, 1); else state.sauces.push(s.n);
      });
      makeChips("sideRow", SIDES, function (s) { return state.sideName === s.n; }, function (s) { state.side = s.e; state.sideName = s.n; });
      makeChips("drinkRow", DRINKS, function (d) { return state.drink === d.e; }, function (d) { state.drink = d.e; });
      makeChips("treatRow", TREATS, function (t) { return (t.n === "No Treat" ? state.treat === "" : state.treat === t.e); },
        function (t) { state.treat = (t.n === "No Treat") ? "" : t.e; });
      draw();
    }

    function draw() {
      var sauceEmos = SAUCES.filter(function (s) { return state.sauces.indexOf(s.n) > -1; }).map(function (s) { return s.e; }).join("");
      document.getElementById("trayFood").textContent = state.main + " " + state.side + " " + state.drink + (state.treat ? " " + state.treat : "") + (sauceEmos ? "  " + sauceEmos : "");
      var sauceText = state.sauces.length ? "with " + state.sauces.join(", ") : "no sauce";
      document.getElementById("orderText").textContent = sauceText;
    }

    function serve() {
      var sauce = state.sauces.length ? state.sauces.join(" + ") : "no sauce";
      document.getElementById("message").textContent = "🍽️ Order up! " + sauce + " — enjoy your meal! 😋";
      party();
    }
    function party() {
      var em = ["🐔", "🍟", "🥤", "🎉", "😋", "🥫", "🍓"];
      for (var i = 0; i < 36; i++) {
        var c = document.createElement("div");
        c.className = "confetti"; c.textContent = em[i % em.length];
        c.style.left = Math.random() * 100 + "vw"; c.style.animationDelay = (Math.random() * 0.8) + "s";
        document.body.appendChild(c);
        setTimeout(function (node) { return function () { node.remove(); }; }(c), 3400);
      }
    }

    document.getElementById("serveBtn").addEventListener("click", serve);
    document.getElementById("resetBtn").addEventListener("click", function () {
      state = { main: "🍗", sauces: [], side: "🍟", sideName: "Waffle Fries", drink: "🥤", treat: "" };
      document.getElementById("message").textContent = "";
      rebuild();
    });
    rebuild();
  </script>
</body>
</html>
