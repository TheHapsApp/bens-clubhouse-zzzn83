<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Oliver's Games!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
    body {
      font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
      min-height: 100vh;
      color: #fff;
      text-align: center;
      background: linear-gradient(120deg, #ff5fa2, #ffd23f, #3fd0ff, #8a5cff);
      background-size: 400% 400%;
      animation: flow 12s ease infinite;
      padding: 26px 16px 50px;
    }
    @keyframes flow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    h1 {
      font-size: clamp(2rem, 8vw, 3.6rem);
      text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
      animation: pop 2.5s ease-in-out infinite;
    }
    @keyframes pop {
      0%, 100% { transform: scale(1) rotate(-1deg); }
      50%      { transform: scale(1.04) rotate(1deg); }
    }
    .sub { font-size: clamp(1rem, 3.5vw, 1.3rem); margin: 8px 0 22px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      max-width: 760px;
      margin: 0 auto;
    }
    a.tile {
      display: block;
      text-decoration: none;
      color: #fff;
      background: rgba(255,255,255,0.22);
      border: 5px solid #fff;
      border-radius: 24px;
      padding: 22px 16px;
      font-size: 1.5rem;
      font-weight: bold;
      backdrop-filter: blur(4px);
      transition: transform 0.12s ease, background 0.12s ease;
      box-shadow: 0 6px 0 rgba(0,0,0,0.2);
    }
    a.tile:hover { transform: translateY(-5px) scale(1.03); background: rgba(255,255,255,0.34); }
    a.tile:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
    a.tile .emo { font-size: 3.4rem; display: block; margin-bottom: 6px; }
  </style>
</head>
<body>
  <h1>🎮 Oliver's Games! 🎮</h1>
  <p class="sub">Tap any game to play it! 👇</p>

  <div class="grid">
    <a class="tile" href="animal.html"><span class="emo">🐾</span>Favorite Animal</a>
    <a class="tile" href="calendar.html"><span class="emo">📅</span>My Calendar</a>
    <a class="tile" href="burger.html"><span class="emo">🍔</span>Build-A-Burger</a>
    <a class="tile" href="chickenmeal.html"><span class="emo">🐔</span>Chicken Meal</a>
    <a class="tile" href="restaurant.html"><span class="emo">🍽️</span>Cozy Restaurant</a>
    <a class="tile" href="food.html"><span class="emo">🍟</span>Snack Shack</a>
    <a class="tile" href="robot.html"><span class="emo">🤖</span>Robot Voice</a>
    <a class="tile" href="quest.html"><span class="emo">🛣️</span>Snack Quest</a>
    <a class="tile" href="frenchtoast.html"><span class="emo">🍞</span>Toast Stacker</a>
  </div>
</body>
</html>
