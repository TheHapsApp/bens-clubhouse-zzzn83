<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Trash Toast Stacker!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
    body {
      font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
      min-height: 100vh;
      color: #fff;
      text-align: center;
      background: linear-gradient(120deg, #ff8f3f, #ffd23f, #8a5cff);
      background-size: 300% 300%;
      animation: flow 12s ease infinite;
      overflow: hidden;
      touch-action: none;
    }
    @keyframes flow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    h1 {
      font-size: clamp(1.8rem, 7vw, 3.4rem);
      margin: 18px 12px 4px;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
    }
    .sub { font-size: clamp(1rem, 3.5vw, 1.3rem); margin-bottom: 10px; }
    .score { font-size: 1.3rem; margin-bottom: 8px; text-shadow: 2px 2px 0 rgba(0,0,0,0.15); }

    /* the butter pecan toast target */
    #target {
      position: relative;
      margin: 10px auto;
      width: clamp(160px, 60vw, 260px);
      height: clamp(160px, 60vw, 260px);
      border-radius: 30px;
      background: rgba(255,255,255,0.22);
      border: 5px dashed #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      backdrop-filter: blur(4px);
      transition: transform 0.12s ease, background 0.12s ease;
    }
    #target.hot { transform: scale(1.08); background: rgba(255,255,255,0.4); }
    #target .big { font-size: clamp(4rem, 22vw, 8rem); line-height: 1; }
    #target .lbl { font-size: clamp(0.9rem, 3.2vw, 1.2rem); margin-top: 6px; }

    .btn {
      font-family: inherit;
      font-weight: bold;
      font-size: clamp(1.1rem, 4.5vw, 1.6rem);
      color: #6a2cff;
      background: #fff;
      border: 4px solid #fff;
      border-radius: 22px;
      padding: 14px 24px;
      margin: 14px 8px;
      cursor: pointer;
      box-shadow: 0 5px 0 rgba(0,0,0,0.25);
    }
    .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.25); }
    .btn.small { font-size: 1rem; padding: 10px 18px; color: #b23; }

    /* a draggable french toast piece */
    .piece {
      position: absolute;
      font-size: clamp(3rem, 14vw, 5rem);
      cursor: grab;
      filter: drop-shadow(2px 4px 3px rgba(0,0,0,0.3));
      touch-action: none;
      z-index: 5;
    }
    .piece.flies::after {
      content: "🪰";
      font-size: 0.4em;
      position: absolute;
      top: -6px; right: -10px;
      animation: buzz 0.5s linear infinite;
    }
    @keyframes buzz { 0%,100%{transform:translate(0,0)} 50%{transform:translate(4px,-4px)} }

    #message {
      font-size: clamp(1.4rem, 6vw, 2.4rem);
      min-height: 1.4em;
      margin-top: 6px;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.18);
    }

    .spark {
      position: absolute;
      font-size: 2rem;
      pointer-events: none;
      z-index: 8;
      animation: fly 0.9s ease-out forwards;
    }
    @keyframes fly {
      to { transform: translate(var(--dx), var(--dy)) scale(0.3) rotate(200deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <h1>🍞🗑️ Trash Toast Stacker! 🥜🧈</h1>
  <p class="sub">Get a piece of trashy french toast, then drag it onto the butter pecan toast!</p>
  <div class="score">Stacked: <span id="count">0</span></div>

  <div id="target">
    <div class="big" id="targetEmoji">🍞</div>
    <div class="lbl">Butter Pecan Buttered Toast<br>🧈 🥜</div>
  </div>

  <div id="message">Tap the button to begin! 👇</div>

  <button class="btn" id="getBtn">Get trashy french toast 🍞🗑️</button>
  <button class="btn small" id="resetBtn">Reset</button>

  <script>
    var count = 0;
    var countEl = document.getElementById("count");
    var msg = document.getElementById("message");
    var target = document.getElementById("target");
    var targetEmoji = document.getElementById("targetEmoji");
    var current = null; // the piece you're holding

    var yummies = ["YUM! 🤤", "Delish! 😋", "Trashtastic! 🗑️✨", "Mmm crunchy! 🥜", "Soggy & sweet! 🍞", "Chef's kiss! 👨‍🍳💋"];

    function spawnPiece() {
      if (current) current.remove(); // only one at a time
      var p = document.createElement("div");
      p.className = "piece flies";
      p.textContent = "🍞";
      // start it near the bottom-middle
      p.style.left = (window.innerWidth / 2 - 40) + "px";
      p.style.top = (window.innerHeight - 170) + "px";
      document.body.appendChild(p);
      current = p;
      msg.textContent = "Now drag it onto the toast! 👆";
      makeDraggable(p);
    }

    function makeDraggable(el) {
      var offX = 0, offY = 0, dragging = false;
      el.addEventListener("pointerdown", function (e) {
        dragging = true;
        el.setPointerCapture(e.pointerId);
        el.style.cursor = "grabbing";
        var r = el.getBoundingClientRect();
        offX = e.clientX - r.left;
        offY = e.clientY - r.top;
      });
      el.addEventListener("pointermove", function (e) {
        if (!dragging) return;
        el.style.left = (e.clientX - offX) + "px";
        el.style.top = (e.clientY - offY) + "px";
        // light up the target when you're over it
        if (overTarget(e.clientX, e.clientY)) target.classList.add("hot");
        else target.classList.remove("hot");
      });
      el.addEventListener("pointerup", function (e) {
        dragging = false;
        el.style.cursor = "grab";
        target.classList.remove("hot");
        if (overTarget(e.clientX, e.clientY)) dropIn();
      });
    }

    function overTarget(x, y) {
      var r = target.getBoundingClientRect();
      return x > r.left && x < r.right && y > r.top && y < r.bottom;
    }

    function dropIn() {
      if (!current) return;
      var r = target.getBoundingClientRect();
      sparkle(r.left + r.width / 2, r.top + r.height / 2);
      current.remove();
      current = null;
      count++;
      countEl.textContent = count;
      // stack the emojis on the toast so you can see your tower!
      targetEmoji.textContent = "🍞" + "🍞".repeat(Math.min(count, 6));
      target.classList.add("hot");
      setTimeout(function () { target.classList.remove("hot"); }, 200);
      msg.textContent = yummies[Math.floor((count - 1) % yummies.length)];
    }

    function sparkle(x, y) {
      var emojis = ["✨", "🥜", "🧈", "🤤", "⭐", "🍞"];
      for (var i = 0; i < 14; i++) {
        var s = document.createElement("div");
        s.className = "spark";
        s.textContent = emojis[i % emojis.length];
        s.style.left = x + "px";
        s.style.top = y + "px";
        var ang = Math.random() * Math.PI * 2;
        var dist = 60 + Math.random() * 90;
        s.style.setProperty("--dx", Math.cos(ang) * dist + "px");
        s.style.setProperty("--dy", Math.sin(ang) * dist + "px");
        document.body.appendChild(s);
        setTimeout(function (node) { return function () { node.remove(); }; }(s), 900);
      }
    }

    document.getElementById("getBtn").addEventListener("click", spawnPiece);
    document.getElementById("resetBtn").addEventListener("click", function () {
      count = 0;
      countEl.textContent = "0";
      targetEmoji.textContent = "🍞";
      if (current) { current.remove(); current = null; }
      msg.textContent = "All cleaned up! Tap the button to begin! 👇";
    });
  </script>
</body>
</html>
